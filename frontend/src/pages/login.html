<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style/global.css">
    <link rel="stylesheet" href="../assets/style/login.css">
    <title>COFFZIN</title>
</head>
<body>
    <div class="container">
        <h1>LOGIN</h1>
        <form class="login-form" onsubmit="return false;"> 
            <input type="text" placeholder="Email" id="email"> <!-- ✅ id trocado de "login" para "email" -->
            <input type="password" placeholder="Password" id="pass">
            <span class="forgetPass">Forget the password?</span>
            <button type="button" onclick="handleLogin()">ENTER</button> <!-- ✅ função renomeada -->
            <span>Dont have Account? <a href="frontend/src/pages/register.html">Create one</a></span>
        </form>
    </div>
    <script src="../script/security/login/login.js"></script>
</body>
</html>
