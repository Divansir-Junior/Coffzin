<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFFZIN - Products</title>
    <link rel="stylesheet" href="../assets/style/global.css">
    <link rel="stylesheet" href="../assets/style/products.css">
    <link rel="shortcut icon" href="../assets/img/CoffzinLogo.png" type="image/x-icon">
</head>
<body>

<header>
    <img src="../assets/img/CoffzinLogo.png" alt="Logo Coffzin" class="logo">
    <nav>
        <ul class="menu">
            <li><a href="/index.html">Home</a></li>
            <li><a href="about.html">About us</a></li>
            <li><a href="contact.html">Contact us</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1>Our Products</h1>
    <div class="container"></div>

    <!-- OVERLAY -->
    <div class="cartOverlay" id="cartOverlay"></div>

    <!-- CARRINHO -->
    <div class="shopCart" id="shopCart">
        <div class="cartHeader">
            <h2>Your cart</h2>
            <button id="closeShopCart">✕</button>
        </div>
        <div class="cartItems" id="cartItems"></div>
        <div class="cartFooter">
            <div id="total">Total <span>R$ 0.00</span></div>
            <button class="checkoutBtn" onclick="finalizePurchase()">Finalize purchase</button>
        </div>
    </div>

    <!-- BOTÃO ABRIR CARRINHO -->
    <button id="openCart" class="cartBtn">
        <i data-lucide="shopping-cart"></i>
        <span id="cartCount">0</span>
    </button>
</main>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="../script/pages/product.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
